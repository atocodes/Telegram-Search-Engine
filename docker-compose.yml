# Full self-contained stack for a single VPS.
#   - caddy    : reverse proxy + automatic HTTPS (Let's Encrypt)
#   - web      : Next.js frontend
#   - api      : FastAPI read-only API
#   - meili    : Meilisearch
#   - postgres : the database (data lives in a named volume)
#
# Everything runs locally — no external database needed.
# Bring up:  docker compose --env-file .env.prod up -d --build

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - web
      - api

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      - FASTAPI_URL=http://api:8000
      - NEXT_PUBLIC_REPO_URL=${NEXT_PUBLIC_REPO_URL}
    expose:
      - "3000"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      # Internal connection to the postgres service (standard URL, no pooler).
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tgsearch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tgsearch}
      - MEILI_URL=http://meili:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_INDEX=channels
      - CORS_ORIGINS=${CORS_ORIGINS}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      meili:
        condition: service_started

  meili:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tgsearch}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-tgsearch}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Migrations run automatically on a FRESH database (first init only).
      # Files run in alphabetical order, so 001_, 002_, ... are applied in order.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgsearch} -d ${POSTGRES_DB:-tgsearch}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Bind to localhost only so the crawl/analysis pipeline (run from the host
    # or via SSH tunnel) can reach the DB, without exposing it to the internet.
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  caddy_data:
  caddy_config:
  meili_data:
  pg_data:
